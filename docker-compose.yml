services:

  # -- RSSHub: Feed aggregation engine --
  rsshub:
    image: diygod/rsshub:latest
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory
      - CACHE_EXPIRE=300
    restart: unless-stopped
    healthcheck:
      # RSSHub image is node-based; use node's built-in http to avoid relying on wget/curl
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:1200/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

