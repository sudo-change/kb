categories:
  - id: bugbounty
    name: "BugBounty"
    description: "Vulnerabilities, techniques, CTFs, writeups, bug bounty programs"
    keywords: ["bug bounty", "vulnerability", "exploit", "ctf", "xss", "ssrf", "idor", "rce", "sqli", "pentest", "writeup", "hackerone", "bugcrowd"]

  - id: ai-money
    name: "AI-Money"
    description: "Dev-related money making with AI, automation income, money glitches"
    keywords: ["make money", "income", "revenue", "side project", "freelance", "automation", "passive income", "ai tool", "monetize"]

  - id: saas-niches
    name: "SaaS-Niches"
